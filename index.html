<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мій План на День</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #f8fafc;
            --text: #1e293b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            margin: 0;
        }

        .container {
            background: white;
            width: 100%;
            max-width: 400px;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        h2 { margin-top: 0; color: var(--primary); text-align: center; }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 1.5rem;
        }

        input {
            flex: 1;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus { border-color: var(--primary); }

        button#add-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button#add-btn:hover { opacity: 0.9; }

        ul { list-style: none; padding: 0; }

        li {
            background: #f1f5f9;
            margin-bottom: 10px;
            padding: 12px 15px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .delete-btn {
            background: #ff4757;
            color: white;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 14px;
        }

        .empty-state {
            text-align: center;
            color: #94a3b8;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🎯 План на сьогодні</h2>
    
    <div class="input-group">
        <input type="text" id="task-input" placeholder="Що потрібно зробити?">
        <button id="add-btn">Додати</button>
    </div>

    <ul id="task-list">
        </ul>
</div>

<script>
    const input = document.getElementById('task-input');
    const addBtn = document.getElementById('add-btn');
    const taskList = document.getElementById('task-list');

    // Завантаження збережених справ
    let tasks = JSON.parse(localStorage.getItem('my_tasks')) || [];

    function renderTasks() {
        taskList.innerHTML = tasks.length === 0 
            ? '<p class="empty-state">Список порожній. Час відпочити!</p>' 
            : '';

        tasks.forEach((task, index) => {
            const li = document.createElement('li');
            li.innerHTML = `
                <span>${task}</span>
                <button class="delete-btn" onclick="deleteTask(${index})">✕</button>
            `;
            taskList.appendChild(li);
        });
        localStorage.setItem('my_tasks', JSON.stringify(tasks));
    }

    function addTask() {
        const text = input.value.trim();
        if (text) {
            tasks.push(text);
            input.value = '';
            renderTasks();
        }
    }

    window.deleteTask = (index) => {
        tasks.splice(index, 1);
        renderTasks();
    };

    addBtn.onclick = addTask;

    // Додавання через Enter
    input.onkeypress = (e) => {
        if (e.key === 'Enter') addTask();
    };

    renderTasks();
</script>

</body>
</html>
