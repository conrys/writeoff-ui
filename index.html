<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safe Connection Tester</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: #f8fafc; padding: 20px; display: flex; justify-content: center; }
        .card { background: #1e293b; width: 100%; max-width: 400px; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #10b981; color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; }
        #log { margin-top: 20px; padding: 15px; background: #000; border-radius: 10px; font-family: monospace; font-size: 12px; min-height: 100px; white-space: pre-wrap; color: #adbac7; }
        .green { color: #10b981; }
        .red { color: #ef4444; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="text-align:center">🔍 Перевірка зв'язку</h2>
    
    <input type="password" id="m_key" placeholder="Логін (Master Key)">
    <input type="file" id="f_input" accept=".wfkey">
    
    <button id="btn" onclick="runSafeTest()">Запустити діагностику</button>

    <div id="log">Очікування активації...</div>
</div>

<script>
    const logEl = document.getElementById('log');
    function log(msg, color = '') { 
        const cl = color ? ` class="${color}"` : '';
        logEl.innerHTML += `\n<span${cl}>> ${msg}</span>`; 
    }

    async function runSafeTest() {
        const mKey = document.getElementById('m_key').value;
        const file = document.getElementById('f_input').files[0];
        if(!mKey || !file) return alert("Введіть ключ та оберіть файл!");

        logEl.innerHTML = "> Починаю тест...";
        
        const reader = new FileReader();
        reader.onload = async function(e) {
            try {
                // 1. Дешифрування файлу
                log("Дешифрування файлу...");
                const bytes = CryptoJS.AES.decrypt(e.target.result, mKey);
                const decrypted = bytes.toString(CryptoJS.enc.Utf8);
                if(!decrypted) throw new Error("Невірний Master Key!");
                
                const config = JSON.parse(decrypted);
                log("Конфіг зчитано успішно.", "green");

                // 2. Авторизація (api_login)
                log("Авторизація в системі Google...");
                const authRes = await fetch(config.g, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'api_login',
                        username: config.u,
                        password: config.p
                    })
                }).then(r => r.json());

                if(!authRes.ok) throw new Error("GAS відхилив вхід: " + authRes.error);
                log("Сесія створена. Токен отримано.", "green");

                // 3. ПІНГ (Перевірка чи працює requireUiSession_)
                log("Відправка PING-запиту...");
                const pingRes = await fetch(config.g, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'ping',
                        session_token: authRes.sessionToken
                    })
                }).then(r => r.json());

                if(pingRes.ok) {
                    log("--- РЕЗУЛЬТАТ ---");
                    log("✅ ЗВ'ЯЗОК ВСТАНОВЛЕНО!", "green");
                    log("GAS бачить твою сесію та Script Properties.");
                    log(`Час на сервері: ${pingRes.ts}`);
                } else {
                    throw new Error("Пінг не пройшов.");
                }

            } catch (err) {
                log(`ПОМИЛКА: ${err.message}`, "red");
            }
        };
        reader.readAsText(file);
    }
</script>

</body>
</html>
